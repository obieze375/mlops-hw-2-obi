display_name: "Classifier + compact hardened prompt"
description: >
  v4-style input classifier plus a shorter hardened refusal prompt (not the
  full v3 essay). Hypothesis: block suspicious input before the main model,
  and explicit jailbreak rules reduce leaks on borderline attacks that look
  like travel questions.
model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B
  temperature: 0.0
system_prompt: prompts/v6_hardened_refusal.txt
guardrail:
  type: input_classifier
  classifier:
    model:
      name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B
      temperature: 0.0
    prompt: prompts/classifier_input.txt
